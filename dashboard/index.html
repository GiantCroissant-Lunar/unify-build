<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UnifyBuild Analytics Dashboard</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="dashboard">
  <header>
    <div>
      <h1>UnifyBuild Analytics</h1>
      <p class="header-copy">Load BuildMetrics JSON reports and explore them locally in your browser.</p>
    </div>
    <div class="header-actions">
      <label class="btn btn-outline" id="load-label">
        Load Metrics
        <input type="file" id="file-input" accept=".json" multiple hidden>
      </label>
      <button class="btn btn-outline" id="clear-data-btn" disabled>Clear Data</button>
      <button class="btn btn-outline" id="csv-export-btn" disabled>Export CSV</button>
    </div>
  </header>

  <div class="page-note">
    Metrics files are processed locally. If you need access control, provide it at the hosting layer.
  </div>

  <div id="filters"></div>
  <div id="drop-zone"></div>
  <div id="stats-cards"></div>
  <div id="empty-state" class="empty-state"></div>
  <div id="charts-grid"></div>
  </div>

  <script src="./app.js"></script>
 </body>
 </html>
