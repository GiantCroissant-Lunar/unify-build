version: "3"

vars:
  HUB_PACKAGE_DIR: node_modules/@giantcroissant-lunar/lunar-snake-hub
  NUKE_DIR_WIN: build\\nuke
  NUKE_DIR_UNIX: build/nuke
  GRAPH_HTML: .nuke/temp/execution-plan.html
  UNIFY_BUILD_TOOL: dotnet tool run unify-build --

tasks:
  release:bump-version:
    desc: Update package versions and top changelog headings before tagging
    vars:
      VERSION: '{{default "" .VERSION}}'
    cmds:
      - pwsh -NoProfile -ExecutionPolicy Bypass -File build/bump-version.ps1 -Version {{.VERSION}}

  version:
    desc: Print the GitVersion-derived version (MajorMinorPatch with optional -N distance suffix)
    cmds:
      - cmd: |
          VER=$(bash tools/gitversion.sh | python -c 'import sys,json; d=json.loads(sys.stdin.read()); base=d["MajorMinorPatch"]; n=int(d.get("CommitsSinceVersionSource") or 0); print(f"{base}-{n}" if n>0 else base)')
          echo "$VER"

  pack:
    desc: Pack UnifyBuild.{Nuke,Tool} via unify-build at the GitVersion-driven version and sync to the local feed
    vars:
      CONFIGURATION: '{{default "Release" .CONFIGURATION}}'
      LOCAL_FEED: '{{default "C:/lunar-horse/packages/nuget" .LOCAL_FEED}}'
    cmds:
      - cmd: dotnet tool restore
      - cmd: |
          export GITVERSION_MAJORMINORPATCH=$(bash tools/gitversion.sh | python -c 'import sys,json; d=json.loads(sys.stdin.read()); base=d["MajorMinorPatch"]; n=int(d.get("CommitsSinceVersionSource") or 0); print(f"{base}-{n}" if n>0 else base)')
          echo "[pack] GITVERSION_MAJORMINORPATCH=${GITVERSION_MAJORMINORPATCH}"
          dotnet tool run unify-build -- PackProjects --configuration {{.CONFIGURATION}}
          mkdir -p "{{.LOCAL_FEED}}"
          cp build/_artifacts/${GITVERSION_MAJORMINORPATCH}/nuget/*.nupkg "{{.LOCAL_FEED}}/"
          echo "[pack] Synced nupkgs to {{.LOCAL_FEED}}/"

  tool:bootstrap-local:
    desc: Pack local UnifyBuild packages and install/update the repo tool manifest from the local flat feed (bootstrap when no published tool is available)
    vars:
      CONFIGURATION: '{{default "Release" .CONFIGURATION}}'
    cmds:
      - cmd: |
          echo "Seeding build/_artifacts/build.config.schema.json (required by UnifyBuild.Nuke.csproj at pack time)..."
          mkdir -p build/_artifacts
          cp build/build.config.schema.json build/_artifacts/build.config.schema.json
      - cmd: |
          VER=$(bash tools/gitversion.sh | python -c 'import sys,json; d=json.loads(sys.stdin.read()); base=d["MajorMinorPatch"]; n=int(d.get("CommitsSinceVersionSource") or 0); print(f"{base}-{n}" if n>0 else base)')
          echo "[tool:bootstrap-local] Packing at version ${VER}"
          dotnet pack -c {{.CONFIGURATION}} -p:Version="${VER}" dotnet/src/UnifyBuild.Nuke/UnifyBuild.Nuke.csproj -o build/_artifacts/local/flat
          dotnet pack -c {{.CONFIGURATION}} -p:Version="${VER}" dotnet/src/UnifyBuild.Tool/UnifyBuild.Tool.csproj -o build/_artifacts/local/flat
          echo "[tool:bootstrap-local] Installing local tool manifest from build/_artifacts/local/flat (version ${VER})..."
          dotnet tool install --local --version "${VER}" --add-source build/_artifacts/local/flat UnifyBuild.Tool || dotnet tool update --local --version "${VER}" --allow-downgrade --add-source build/_artifacts/local/flat UnifyBuild.Tool

  hub:install-hooks:
    desc: Install pre-commit hooks from lunar-snake-hub into .git/hooks
    cmds:
      - cmd: node {{.HUB_PACKAGE_DIR}}/bin/hub-install-hooks.js

  hub:uninstall-hooks:
    desc: Uninstall pre-commit hooks and restore backups
    cmds:
      - cmd: node {{.HUB_PACKAGE_DIR}}/bin/hub-uninstall-hooks.js

  hub:symlink-agent:
    desc: Create .agent link to hub agent rules (for IDE agents)
    cmds:
      - cmd: |
          if not exist .agent (
            mklink /J .agent node_modules\@giantcroissant-lunar\lunar-snake-hub\.agent
          ) else (
            echo .agent already exists, skipping
          )
        platforms: [windows]
      - cmd: |
          if [ -L .agent ] || [ -e .agent ]; then
            echo ".agent already exists, skipping"
          else
            ln -s {{.HUB_PACKAGE_DIR}}/.agent .agent
          fi
        platforms: [linux, darwin]

  graph:
    desc: Generate NUKE target dependency graph (execution plan HTML)
    vars:
      TARGET: '{{default "PackProjects" .TARGET}}'
    cmds:
      - cmd: 'echo "If unify-build is not published for the current version line, run: task tool:bootstrap-local"'
      - cmd: dotnet tool restore
      - cmd: '{{.UNIFY_BUILD_TOOL}} {{.TARGET}} --plan'
      - cmd: echo Graph written to {{.GRAPH_HTML}}

  graph:open:
    desc: Generate + open the NUKE execution plan graph
    deps: [graph]
    cmds:
      - cmd: powershell -NoProfile -Command "Start-Process (Resolve-Path '{{.GRAPH_HTML}}')"
        platforms: [windows]
      - cmd: xdg-open '{{.GRAPH_HTML}}'
        platforms: [linux]
      - cmd: open '{{.GRAPH_HTML}}'
        platforms: [darwin]

  nuke:compile:
    desc: Run NUKE Compile (build)
    vars:
      CONFIGURATION: '{{default "Release" .CONFIGURATION}}'
    cmds:
      - cmd: 'echo "If unify-build is not published for the current version line, run: task tool:bootstrap-local"'
      - cmd: dotnet tool restore
      - cmd: '{{.UNIFY_BUILD_TOOL}} Compile --configuration {{.CONFIGURATION}}'

  nuke:pack-projects:
    desc: Run NUKE PackProjects (build NuGet packages)
    vars:
      CONFIGURATION: '{{default "Release" .CONFIGURATION}}'
    cmds:
      - cmd: 'echo "If unify-build is not published for the current version line, run: task tool:bootstrap-local"'
      - cmd: dotnet tool restore
      - cmd: '{{.UNIFY_BUILD_TOOL}} PackProjects --configuration {{.CONFIGURATION}}'

  nuke:publish-hosts:
    desc: Run NUKE PublishHosts (publish executables/hosts)
    vars:
      CONFIGURATION: '{{default "Release" .CONFIGURATION}}'
    cmds:
      - cmd: 'echo "If unify-build is not published for the current version line, run: task tool:bootstrap-local"'
      - cmd: dotnet tool restore
      - cmd: '{{.UNIFY_BUILD_TOOL}} PublishHosts --configuration {{.CONFIGURATION}}'

  nuke:publish-plugins:
    desc: Run NUKE PublishPlugins (publish plugins/runtime libraries)
    vars:
      CONFIGURATION: '{{default "Release" .CONFIGURATION}}'
    cmds:
      - cmd: 'echo "If unify-build is not published for the current version line, run: task tool:bootstrap-local"'
      - cmd: dotnet tool restore
      - cmd: '{{.UNIFY_BUILD_TOOL}} PublishPlugins --configuration {{.CONFIGURATION}}'

  nuke:publish-projects:
    desc: Run NUKE PublishProjects (publish explicit projects from build.config.json)
    vars:
      CONFIGURATION: '{{default "Release" .CONFIGURATION}}'
    cmds:
      - cmd: 'echo "If unify-build is not published for the current version line, run: task tool:bootstrap-local"'
      - cmd: dotnet tool restore
      - cmd: '{{.UNIFY_BUILD_TOOL}} PublishProjects --configuration {{.CONFIGURATION}}'

  nuke:sync-latest-artifacts:
    desc: Run NUKE SyncLatestArtifacts (sync build/_artifacts/{version} to build/_artifacts/latest)
    vars:
      CONFIGURATION: '{{default "Release" .CONFIGURATION}}'
    cmds:
      - cmd: 'echo "If unify-build is not published for the current version line, run: task tool:bootstrap-local"'
      - cmd: dotnet tool restore
      - cmd: '{{.UNIFY_BUILD_TOOL}} SyncLatestArtifacts --configuration {{.CONFIGURATION}}'

  dogfood:
    desc: Dogfood - Build unify-build using its own tooling and verify output
    vars:
      CONFIGURATION: '{{default "Release" .CONFIGURATION}}'
    cmds:
      - task: nuke:pack-projects
        vars:
          CONFIGURATION: '{{.CONFIGURATION}}'
      - cmd: powershell -NoProfile -ExecutionPolicy Bypass -File build/verify-dogfood.ps1
        platforms: [windows]

  dogfood:tool:
    desc: Dogfood - Build using the dotnet tool (requires tool to be installed)
    vars:
      CONFIGURATION: '{{default "Release" .CONFIGURATION}}'
    cmds:
      - task: tool:bootstrap-local
        vars:
          CONFIGURATION: '{{.CONFIGURATION}}'
      - echo "Running tool to build itself..."
      - dotnet unify-build PackProjects --configuration {{.CONFIGURATION}}
